baseURL = "https://mylvzi.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "lvzi's blog"
theme = "hugo-stellar"

paginate = 10
buildFuture = true
relativeURLs = false

[permalinks]
  posts = "/posts/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "lvzi"
  avatar = "/photos/刘堃现场.jpeg"
  logo = "/favicon-32x32.png"
  copyright = "© 2026 lvzi. All rights reserved."

  description = [
    "记录技术、思考与生活。",
    "A clean blog about code and ideas."
  ]

  notice = [
    "欢迎来到我的博客。",
    "持续更新算法与工程实践。"
  ]

  [[params.social]]
    name = "GitHub"
    url = "https://github.com/mylvzi"
    logo = "/social/github.svg"

  [[params.social]]
    name = "Blog"
    url = "https://mylvzi.github.io/"
    logo = "/favicon-32x32.png"

[menus]
  [[menus.main]]
    name = "博客"
    weight = 1
    url = "/"

    [[menus.main.params.tabs]]
      name = "所有文章"
      url = "/"

    [[menus.main.params.tabs]]
      name = "分类"
      url = "/categories/"

    [[menus.main.params.tabs]]
      name = "标签"
      url = "/tags/"

    [[menus.main.params.tabs]]
      name = "归档"
      url = "/archives/"

  [[menus.main]]
    name = "搜索"
    weight = 2
    url = "/search/"

    [[menus.main.params.tabs]]
      name = "站内搜索"
      url = "/search/?sec=posts"

  [[menus.main]]
    name = "关于"
    weight = 3
    url = "/about/"

    [[menus.main.params.tabs]]
      name = "关于我"
      url = "/about/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    style = "github"
