preconnect:
  - https://gcore.jsdelivr.net
  - https://unpkg.com
  - https://cdn.bootcdn.net

inject:
  head:
    - <link rel="shortcut icon" href="/favicon.png">
    - <meta name="theme-color" content="#f8f8f8">
    - <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.2/css/all.css" rel="stylesheet">
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    - <link rel="stylesheet" href="/css/theme-toggle.css">
    - >-
      <script>(function(){var key='stellar-theme-preference';var root=document.documentElement;var stored=localStorage.getItem(key);var systemDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;var theme=stored==='light'||stored==='dark'?stored:(systemDark?'dark':'light');root.setAttribute('data-theme',theme);root.style.colorScheme=theme;})();</script>
  script:
    - <script src="/js/theme-toggle.js" defer></script>
    - <script src="/js/blog-effects.js" defer></script>
    - <script src="/js/blog-runtime.js" defer></script>
    - <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    - <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    - <script src="/js/music-player.js" defer></script>


site_tree:
  home:
    sidebar: starter, welcome, recent
  index_blog:
    sidebar: starter, welcome, recent
    nav_tabs:
      Prompt合集: /prompts/
      关于我: /about/
      阅读笔记: /reading/
  index_archive:
    menu_id: archives
  topic:
    menu_id: topic

article:
  auto_cover: false
  auto_excerpt: 128
  share: [wechat, x, email, link]
  category_color:
    '技术分享': '#f44336'
  #npm i hexo-related-popular-posts
  # related_posts:
  #   enable: true
  #   title: 您可能感兴趣的文章
  #   max_count: 3


style:
  text-align: justify
  smooth_scroll: false
  codeblock:
    scrollbar: 0px
  font-size:
    body: 1rem
  font-family:
    logo: '"Helvetica Neue", Helvetica, Arial, system-ui, "Microsoft Yahei", "Segoe UI", -apple-system, Roboto, Ubuntu, sans-serif'
    body: '"Helvetica Neue", Helvetica, Arial, system-ui, "Microsoft Yahei", "Segoe UI", -apple-system, Roboto, Ubuntu, sans-serif'
    code: '"SF Mono", Menlo, Monaco, Consolas, system-ui, "Courier New", monospace, sans-serif'
    codeblock: '"SF Mono", Menlo, Monaco, Consolas, system-ui, "Courier New", monospace, sans-serif'

comments:
  service: utterances
  utterances:
    repo: mylvzi/my-blog
footer:
  stats:
    enable: true
    since: 2026-03-30T00:00:00+08:00
  content: "" # 支持 Markdown 格式
